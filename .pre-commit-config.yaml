default_language_version:
    python: python3.14
fail_fast: false
minimum_pre_commit_version: 4.1.0
repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v5.0.0
      hooks:
          - id: trailing-whitespace
          - id: end-of-file-fixer
          - id: check-yaml
          - id: check-json
          - id: check-toml
          - id: check-merge-conflict
          - id: detect-private-key
          - id: check-added-large-files
            args: ['--maxkb=500']
          - id: mixed-line-ending
            args: ['--fix=lf']

    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.15.11
      hooks:
          - id: ruff-check
            args: ['--fix']
          - id: ruff-format

    - repo: https://github.com/pre-commit/mirrors-mypy
      rev: v1.20.2
      hooks:
          - id: mypy
            additional_dependencies:
                - pydantic>=2.7
                - pydantic-settings>=2.14.1
                - fastapi>=0.115
                - httpx>=0.27
                - beautifulsoup4>=4.14.3
                - types-beautifulsoup4>=4.12
                - pytest>=9.0.3
                - pytest-asyncio>=1.4.0

    - repo: https://github.com/chrysa/pre-commit-tools
      rev: v0.1.1-92
      hooks:
          - id: debugger-detection
          - id: python-print-detection
          - id: no-bare-except
          - id: fastapi-missing-response-model
          - id: yaml-sorter
            exclude: ^(\.github/(workflows|ISSUE_TEMPLATE)/|GitVersion\.yml)
          - id: regression-gate
            stages: [pre-push]
          - id: adr-gate
          - id: no-sync-in-async
          - id: dockerfile-no-latest
          - id: console-log-detection
          - id: console-debug-detection
          - id: react-console-error-detection
          - id: no-console-warn
          - id: import-no-relative-parent

    - repo: https://github.com/compilerla/conventional-pre-commit
      rev: v4.4.0
      hooks:
          - id: conventional-pre-commit
            stages: [commit-msg]
            args: [feat, fix, docs, style, refactor, test, chore, perf, revert, ci]
