services:
  api:
    build:
      context: .
      target: dev
    environment:
      ALLOWED_ORIGINS: '["http://localhost:5173","http://localhost:8011"]'
      DEBUG: 'true'
      HOME: /tmp
      MYPY_CACHE_DIR: /tmp/.toolcache/mypy
      PYTEST_ADDOPTS: -p no:cacheprovider
      PYTHONPYCACHEPREFIX: /tmp/.toolcache/pycache
      RUFF_CACHE_DIR: /tmp/.toolcache/ruff
    ports:
    - 8010:8000
    user: ${UID:-1000}:${GID:-1000}
    volumes:
    - ./api:/app/api:ro
  frontend:
    build:
      context: ./app
      target: dev
    environment:
      HOME: /tmp
      VITE_API_URL: ''
    ports:
    - 5173:5173
    user: ${UID:-1000}:${GID:-1000}
    volumes:
    - ./app/src:/app/src:ro
