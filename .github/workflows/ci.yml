---
name: CI

on:
    push:
        branches:
            - main
            - develop
            - "feat/**"
            - "fix/**"
            - "ci/**"
            - "chore/**"
    pull_request:
        branches: [main, develop]
    workflow_dispatch:

permissions:
    checks: write
    contents: read
    pull-requests: write
    statuses: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: Lint & Type-check
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6
            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: '3.14'
            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install ruff mypy types-beautifulsoup4 \
                    pydantic pydantic-settings fastapi httpx beautifulsoup4
            - name: Run ruff
              run: ruff check api tests && ruff format --check api tests
            - name: Run mypy
              run: mypy api

    test-backend:
        name: Backend Tests
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v6
            - name: Build test image
              run: docker build --target test -t cdn-explorer-api:test .
            - name: Run tests
              run: docker run --rm cdn-explorer-api:test
            - name: Extract coverage
              run: |
                  docker run --rm -v ${{ github.workspace }}/coverage:/app/coverage_out \
                    cdn-explorer-api:test sh -c "cp coverage.xml /app/coverage_out/" || true

    test-frontend:
        name: Frontend Tests
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6
            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: npm
                  cache-dependency-path: app/package-lock.json
            - name: Install
              run: npm ci
              working-directory: app
            - name: Lint
              run: npm run lint
              working-directory: app
            - name: Typecheck
              run: npm run typecheck
              working-directory: app
            - name: Test
              run: npm test
              working-directory: app

    build:
        name: Build Docker images
        runs-on: ubuntu-latest
        timeout-minutes: 30
        needs:
            - lint
            - test-backend
            - test-frontend
        steps:
            - uses: actions/checkout@v6
            - name: Build API (production)
              run: docker build --target production -t cdn-explorer-api:ci .
            - name: Build App (production)
              run: docker build --target production -t cdn-explorer-app:ci ./app
