true:
  pull_request:
    branches:
    - main
  push:
    branches:
    - chore/**
    - feat/**
    - fix/**
    - main
jobs:
  build:
    name: Build Docker images
    needs:
    - lint
    - test-backend
    - test-frontend
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Build API (production)
      run: docker build --target production -t cdn-explorer-api:ci .
    - name: Build App (production)
      run: docker build --target production -t cdn-explorer-app:ci ./app
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: "python -m pip install --upgrade pip\npip install ruff mypy pre-commit\
        \ types-beautifulsoup4 \\\n  pydantic pydantic-settings fastapi httpx beautifulsoup4\n"
    - name: Run ruff
      run: ruff check api tests && ruff format --check api tests
    - name: Run mypy
      run: mypy api
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Build test image
      run: docker build --target test -t cdn-explorer-api:test .
    - name: Run tests
      run: docker run --rm cdn-explorer-api:test
    - name: Extract coverage
      run: "docker run --rm -v ${{ github.workspace }}/coverage:/app/coverage_out\
        \ \\\n  cdn-explorer-api:test sh -c \"cp coverage.xml /app/coverage_out/\"\
        \ || true\n"
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        cache: npm
        cache-dependency-path: app/package-lock.json
        node-version: '22'
    - name: Install
      run: npm ci
      working-directory: app
    - name: Lint
      run: npm run lint
      working-directory: app
    - name: Typecheck
      run: npm run typecheck
      working-directory: app
    - name: Test
      run: npm test
      working-directory: app
name: CI
