on:
  schedule:
  - cron: 0 3 * * 1
  workflow_dispatch:
    inputs:
      paths:
        default: lifeos
        description: 'Comma-separated paths to mutate (default: lifeos)'
        required: false
      threshold:
        default: '70'
        description: "Minimum mutation score (0\u2013100)"
        required: false
env:
  MUTATION_PATHS: ${{ github.event.inputs.paths || 'lifeos' }}
  MUTATION_THRESHOLD: ${{ github.event.inputs.threshold || '70' }}
jobs:
  mutation:
    name: Mutmut
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: 'python -m pip install --upgrade pip

        pip install -e ".[dev]" mutmut

        '
    - id: mutmut
      name: Run mutmut
      run: "mutmut run \\\n  --paths-to-mutate \"${{ env.MUTATION_PATHS }}\" \\\n\
        \  --runner \"python -m pytest tests/ -x -q --no-header\" \\\n  --no-progress\
        \ \\\n  || true\n"
    - id: score
      name: Compute mutation score
      run: "KILLED=$(mutmut results 2>/dev/null | grep -c \"^Killed\" || echo 0)\n\
        SURVIVED=$(mutmut results 2>/dev/null | grep -c \"^Survived\" || echo 0)\n\
        TOTAL=$((KILLED + SURVIVED))\nif [ \"$TOTAL\" -eq 0 ]; then\n  echo \"score=100\"\
        \ >> \"$GITHUB_OUTPUT\"\nelse\n  SCORE=$(( KILLED * 100 / TOTAL ))\n  echo\
        \ \"score=$SCORE\" >> \"$GITHUB_OUTPUT\"\nfi\n{\n  echo \"killed=$KILLED\"\
        \n  echo \"survived=$SURVIVED\"\n  echo \"total=$TOTAL\"\n} >> \"$GITHUB_OUTPUT\"\
        \n"
    - if: always()
      name: Show surviving mutants
      run: mutmut results || true
    - name: Fail if score below threshold
      run: "SCORE=${{ steps.score.outputs.score }}\nTHRESHOLD=${{ env.MUTATION_THRESHOLD\
        \ }}\necho \"Mutation score: ${SCORE}% (threshold: ${THRESHOLD}%)\"\nif [\
        \ \"$SCORE\" -lt \"$THRESHOLD\" ]; then\n  echo \"\u274C Mutation score ${SCORE}%\
        \ is below threshold ${THRESHOLD}%\"\n  exit 1\nfi\necho \"\u2705 Mutation\
        \ score ${SCORE}% meets threshold ${THRESHOLD}%\"\n"
    - if: always()
      name: Upload mutmut results
      uses: actions/upload-artifact@v4
      with:
        name: mutmut-results
        path: .mutmut-cache
        retention-days: 7
name: Mutation Testing
permissions:
  contents: read
